<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사과 게임 (Apple Game)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            background-color: #fffaf0;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 전체 스크롤 원천 차단 */
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 메인 컨테이너: 전체 화면 크기에 고정 */
        .game-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            max-width: 800px; /* 너무 넓어지는 것 방지 */
            padding: 0.5rem;
            box-sizing: border-box;
        }

        /* 헤더: 고정 높이 */
        .game-header {
            flex-shrink: 0;
            margin-bottom: 0.5rem;
        }

        /* 보드 영역: 남은 공간 모두 차지 */
        .board-wrapper {
            flex-grow: 1;
            flex-shrink: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
            padding: 4px;
        }

        .apple-grid {
            display: grid;
            gap: 2px;
            cursor: crosshair;
            position: relative;
            user-select: none;
        }

        .apple {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            pointer-events: none;
        }

        .apple-svg-container {
            width: 90%;
            height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .apple-value {
            position: absolute;
            z-index: 5;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            pointer-events: none;
        }

        .apple.removed {
            visibility: hidden;
        }

        .selection-rect {
            position: absolute;
            border: 2px solid #3b82f6;
            background-color: rgba(59, 130, 246, 0.2);
            pointer-events: none;
            z-index: 50;
            display: none;
            border-radius: 4px;
        }

        .highlight .apple-svg-container {
            filter: brightness(1.1) saturate(1.2);
            transform: scale(1.05);
        }

        /* 컨트롤 영역: 고정 높이 */
        .game-controls {
            flex-shrink: 0;
            padding-top: 0.5rem;
            display: flex;
            justify-content: center;
        }

        @media (max-width: 640px) {
            .apple-value {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Header -->
        <div class="game-header bg-white p-3 rounded-xl shadow-sm border border-red-50 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl">🍎</span>
                <h1 class="text-lg font-black text-red-600">사과 게임</h1>
            </div>
            <div class="flex gap-4 text-center">
                <div>
                    <p class="text-[9px] text-gray-400 font-bold">SCORE</p>
                    <p id="score" class="text-lg font-black text-gray-800">0</p>
                </div>
                <div class="min-w-[50px]">
                    <p class="text-[9px] text-gray-400 font-bold">TIME</p>
                    <p id="timer" class="text-lg font-black text-red-500">120</p>
                </div>
            </div>
        </div>

        <!-- Board -->
        <div id="board-wrapper" class="board-wrapper">
            <div id="board-container" class="relative">
                <div id="grid" class="apple-grid"></div>
                <div id="selection-rect" class="selection-rect"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="game-controls">
            <button id="reset-btn" class="w-full max-w-xs py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl shadow-md transition-all active:scale-95">
                게임 재시작
            </button>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] hidden">
        <div class="bg-white p-8 rounded-3xl text-center max-w-xs w-full mx-4 shadow-2xl">
            <div class="text-5xl mb-4">🍎</div>
            <h2 class="text-2xl font-black text-gray-800 mb-1">시간 종료!</h2>
            <p id="final-score-text" class="text-gray-500 mb-6">최종 점수: 0점</p>
            <button onclick="startGame()" class="w-full py-4 bg-red-500 hover:bg-red-600 text-white text-xl font-black rounded-2xl transition-all">
                다시 시작
            </button>
        </div>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const boardWrapper = document.getElementById('board-wrapper');
        const boardContainer = document.getElementById('board-container');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const selectionRect = document.getElementById('selection-rect');
        const gameOverModal = document.getElementById('game-over');
        const finalScoreText = document.getElementById('final-score-text');
        const resetBtn = document.getElementById('reset-btn');

        const COLS = 10; // 화면비를 고려해 10x12 정도로 고정
        const ROWS = 12;
        const INITIAL_TIME = 120;

        let score = 0;
        let timeLeft = INITIAL_TIME;
        let apples = [];
        let isDragging = false;
        let startPos = { x: 0, y: 0 };
        let gameActive = false;
        let timerInterval;

        function createAppleSVG() {
            return `
                <svg viewBox="0 0 100 100" class="w-full h-full pointer-events-none">
                    <path d="M50 25 C52 10 58 10 60 15" stroke="#5D4037" stroke-width="4" fill="none" stroke-linecap="round" />
                    <path d="M50 20 C40 10 30 15 35 25 C40 30 50 20 50 20" fill="#4CAF50" />
                    <path d="M50 30 C30 30 15 40 15 60 C15 85 35 95 50 90 C65 95 85 85 85 60 C85 40 70 30 50 30 Z" fill="#FF4444" />
                    <ellipse cx="35" cy="45" rx="8" ry="12" fill="white" fill-opacity="0.3" transform="rotate(-20 35 45)" />
                </svg>
            `;
        }

        function initGrid() {
            gridElement.innerHTML = '';
            apples = [];
            
            // 래퍼 크기에 맞춰 사과 크기 동적 계산
            const w = boardWrapper.clientWidth - 16;
            const h = boardWrapper.clientHeight - 16;
            const size = Math.floor(Math.min(w / COLS, h / ROWS));
            
            gridElement.style.gridTemplateColumns = `repeat(${COLS}, ${size}px)`;

            for (let i = 0; i < ROWS * COLS; i++) {
                const value = Math.floor(Math.random() * 9) + 1;
                const appleDiv = document.createElement('div');
                appleDiv.className = 'apple';
                appleDiv.style.width = `${size}px`;
                appleDiv.style.height = `${size}px`;
                
                const container = document.createElement('div');
                container.className = 'apple-svg-container';
                container.innerHTML = createAppleSVG();
                
                const valueSpan = document.createElement('span');
                valueSpan.className = 'apple-value';
                valueSpan.innerText = value;
                
                appleDiv.appendChild(container);
                appleDiv.appendChild(valueSpan);
                gridElement.appendChild(appleDiv);
                
                apples.push({
                    element: appleDiv,
                    value: value,
                    removed: false,
                    rect: null // 나중에 드래그 계산용
                });
            }
            updateAppleRects();
        }

        function updateAppleRects() {
            const gridRect = gridElement.getBoundingClientRect();
            apples.forEach(apple => {
                const r = apple.element.getBoundingClientRect();
                apple.rect = {
                    left: r.left - gridRect.left,
                    top: r.top - gridRect.top,
                    right: r.right - gridRect.left,
                    bottom: r.bottom - gridRect.top
                };
            });
        }

        function startGame() {
            score = 0;
            timeLeft = INITIAL_TIME;
            scoreElement.innerText = score;
            timerElement.innerText = timeLeft;
            gameOverModal.classList.add('hidden');
            gameActive = true;
            initGrid();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            finalScoreText.innerText = `최종 점수: ${score}점`;
            gameOverModal.classList.remove('hidden');
        }

        function handleStart(e) {
            if (!gameActive) return;
            e.preventDefault();
            
            isDragging = true;
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            const rect = gridElement.getBoundingClientRect();
            startPos = {
                x: clientX - rect.left,
                y: clientY - rect.top
            };

            selectionRect.style.display = 'block';
            selectionRect.style.left = `${startPos.x}px`;
            selectionRect.style.top = `${startPos.y}px`;
            selectionRect.style.width = '0px';
            selectionRect.style.height = '0px';
        }

        function handleMove(e) {
            if (!isDragging || !gameActive) return;
            e.preventDefault();

            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);

            const rect = gridElement.getBoundingClientRect();
            const curX = clientX - rect.left;
            const curY = clientY - rect.top;

            const left = Math.min(startPos.x, curX);
            const top = Math.min(startPos.y, curY);
            const width = Math.abs(curX - startPos.x);
            const height = Math.abs(curY - startPos.y);

            selectionRect.style.left = `${left}px`;
            selectionRect.style.top = `${top}px`;
            selectionRect.style.width = `${width}px`;
            selectionRect.style.height = `${height}px`;

            const selBox = { left, top, right: left + width, bottom: top + height };
            
            apples.forEach(apple => {
                if (apple.removed) return;
                const isInside = !(apple.rect.left > selBox.right || 
                                   apple.rect.right < selBox.left || 
                                   apple.rect.top > selBox.bottom || 
                                   apple.rect.bottom < selBox.top);
                
                if (isInside) apple.element.classList.add('highlight');
                else apple.element.classList.remove('highlight');
            });
        }

        function handleEnd() {
            if (!isDragging || !gameActive) return;
            isDragging = false;
            selectionRect.style.display = 'none';

            let sum = 0;
            const selected = [];
            apples.forEach(apple => {
                if (!apple.removed && apple.element.classList.contains('highlight')) {
                    sum += apple.value;
                    selected.push(apple);
                }
            });

            if (sum === 10) {
                selected.forEach(apple => {
                    apple.removed = true;
                    apple.element.classList.add('removed');
                });
                score += selected.length;
                scoreElement.innerText = score;
            }

            apples.forEach(a => a.element.classList.remove('highlight'));
        }

        // 이벤트 바인딩 (보드 컨테이너 레벨에서 처리)
        boardContainer.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        boardContainer.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        resetBtn.addEventListener('click', startGame);
        window.addEventListener('resize', () => { if (gameActive) initGrid(); });

        startGame();
    </script>
</body>
</html>
