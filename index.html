<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사과 게임 (Apple Game)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none; /* 브라우저 기본 터치 액션 방지 */
            user-select: none;
            -webkit-user-select: none;
            background-color: #fffaf0;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            overflow: hidden; /* 전체 페이지 스크롤 방지 */
        }
        .apple-grid {
            display: grid;
            grid-template-columns: repeat(17, 1fr);
            gap: 4px;
            cursor: crosshair;
            position: relative;
            padding: 10px;
        }
        .apple {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.1s ease;
            pointer-events: none; /* 사과 자체가 이벤트를 가로막지 않도록 설정 */
        }
        .apple-svg-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .apple-value {
            position: absolute;
            z-index: 5;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        .apple.removed {
            visibility: hidden;
        }
        .selection-rect {
            position: absolute;
            border: 2px solid #3b82f6;
            background-color: rgba(59, 130, 246, 0.2);
            pointer-events: none;
            z-index: 50;
            display: none;
            border-radius: 4px;
        }
        .highlight .apple-svg-container {
            filter: brightness(1.2) saturate(1.2);
            transform: scale(1.1);
        }
        .highlight::after {
            content: '';
            position: absolute;
            inset: -2px;
            border: 2px solid #3b82f6;
            border-radius: 8px;
            z-index: 2;
        }
        @media (max-width: 768px) {
            .apple-grid {
                grid-template-columns: repeat(10, 1fr);
                gap: 2px;
            }
            .apple-value {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2 md:p-4">

    <!-- Game Header -->
    <div class="w-full max-w-5xl mb-4 flex justify-between items-center bg-white p-4 rounded-2xl shadow-lg border border-red-100">
        <div class="flex items-center gap-3">
            <div class="bg-red-100 p-2 rounded-lg">
                <span class="text-2xl">🍎</span>
            </div>
            <div>
                <h1 class="text-xl md:text-2xl font-black text-red-600 leading-tight">사과 게임</h1>
                <p class="text-xs md:text-sm text-gray-500 font-medium">합이 10이 되게 드래그!</p>
            </div>
        </div>
        <div class="flex gap-4 md:gap-8 text-center">
            <div>
                <p class="text-[10px] md:text-xs text-gray-400 font-bold uppercase tracking-wider">SCORE</p>
                <p id="score" class="text-xl md:text-3xl font-black text-gray-800">0</p>
            </div>
            <div class="min-w-[60px]">
                <p class="text-[10px] md:text-xs text-gray-400 font-bold uppercase tracking-wider">TIME</p>
                <p id="timer" class="text-xl md:text-3xl font-black text-red-500">120</p>
            </div>
        </div>
    </div>

    <!-- Game Board -->
    <div id="board-container" class="relative bg-white rounded-2xl shadow-2xl border-8 border-red-50 max-w-full overflow-hidden">
        <div id="grid" class="apple-grid">
            <!-- Apples will be generated here -->
        </div>
        <div id="selection-rect" class="selection-rect"></div>
    </div>

    <!-- Controls -->
    <div class="mt-6 flex gap-4 w-full max-w-md">
        <button id="reset-btn" class="flex-1 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl shadow-md transition-all active:scale-95">
            게임 재시작
        </button>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over" class="fixed inset-0 bg-red-900/40 backdrop-blur-sm flex items-center justify-center z-[100] hidden">
        <div class="bg-white p-8 rounded-3xl text-center max-w-sm w-full mx-4 shadow-2xl border-4 border-red-100">
            <div class="text-6xl mb-4">🍎</div>
            <h2 class="text-3xl font-black text-gray-800 mb-1">Time's Up!</h2>
            <p class="text-gray-500 font-medium mb-6">최종 점수를 확인하세요</p>
            <div class="bg-red-50 rounded-2xl py-6 mb-8">
                <p id="final-score" class="text-6xl font-black text-red-600">0</p>
                <p class="text-red-300 font-bold">POINTS</p>
            </div>
            <button onclick="startGame()" class="w-full py-4 bg-red-500 hover:bg-red-600 text-white text-xl font-black rounded-2xl shadow-xl transition-all active:scale-95">
                다시 도전하기
            </button>
        </div>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const boardContainer = document.getElementById('board-container');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const selectionRect = document.getElementById('selection-rect');
        const gameOverModal = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');
        const resetBtn = document.getElementById('reset-btn');

        const ROWS = 10;
        const COLS = 17;
        const INITIAL_TIME = 120;

        let score = 0;
        let timeLeft = INITIAL_TIME;
        let apples = [];
        let isDragging = false;
        let startPos = { x: 0, y: 0 };
        let gameActive = false;
        let timerInterval;

        function createAppleSVG() {
            return `
                <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-sm pointer-events-none">
                    <path d="M50 25 C52 10 58 10 60 15" stroke="#5D4037" stroke-width="4" fill="none" stroke-linecap="round" />
                    <path d="M50 20 C40 10 30 15 35 25 C40 30 50 20 50 20" fill="#4CAF50" />
                    <path d="M50 30 C30 30 15 40 15 60 C15 85 35 95 50 90 C65 95 85 85 85 60 C85 40 70 30 50 30 Z" fill="#FF4444" />
                    <ellipse cx="35" cy="45" rx="8" ry="12" fill="white" fill-opacity="0.3" transform="rotate(-20 35 45)" />
                </svg>
            `;
        }

        function initGrid() {
            gridElement.innerHTML = '';
            apples = [];
            const currentCols = window.innerWidth < 768 ? 10 : COLS;
            gridElement.style.gridTemplateColumns = `repeat(${currentCols}, 1fr)`;

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < currentCols; c++) {
                    const value = Math.floor(Math.random() * 9) + 1;
                    const appleDiv = document.createElement('div');
                    appleDiv.className = 'apple';
                    
                    const container = document.createElement('div');
                    container.className = 'apple-svg-container pointer-events-none';
                    container.innerHTML = createAppleSVG();
                    
                    const valueSpan = document.createElement('span');
                    valueSpan.className = 'apple-value pointer-events-none';
                    valueSpan.innerText = value;
                    
                    appleDiv.appendChild(container);
                    appleDiv.appendChild(valueSpan);
                    gridElement.appendChild(appleDiv);
                    
                    apples.push({
                        element: appleDiv,
                        value: value,
                        removed: false
                    });
                }
            }
        }

        function startGame() {
            score = 0;
            timeLeft = INITIAL_TIME;
            scoreElement.innerText = score;
            timerElement.innerText = timeLeft;
            timerElement.classList.remove('text-red-500');
            gameOverModal.classList.add('hidden');
            gameActive = true;
            initGrid();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft;
                if (timeLeft <= 10) timerElement.classList.add('text-red-500');
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            finalScoreElement.innerText = score;
            gameOverModal.classList.remove('hidden');
        }

        function handleStart(e) {
            if (!gameActive) return;
            // 텍스트 선택 및 브라우저 기본 드래그 방지
            if (e.type === 'mousedown') e.preventDefault();
            
            isDragging = true;
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            const rect = gridElement.getBoundingClientRect();
            startPos = {
                x: clientX - rect.left,
                y: clientY - rect.top
            };

            selectionRect.style.display = 'block';
            selectionRect.style.left = `${startPos.x}px`;
            selectionRect.style.top = `${startPos.y}px`;
            selectionRect.style.width = '0px';
            selectionRect.style.height = '0px';
        }

        function handleMove(e) {
            if (!isDragging || !gameActive) return;
            // 터치 시 스크롤 방지
            if (e.type === 'touchmove') e.preventDefault();

            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);

            const rect = gridElement.getBoundingClientRect();
            const currentX = clientX - rect.left;
            const currentY = clientY - rect.top;

            const left = Math.min(startPos.x, currentX);
            const top = Math.min(startPos.y, currentY);
            const width = Math.abs(currentX - startPos.x);
            const height = Math.abs(currentY - startPos.y);

            selectionRect.style.left = `${left}px`;
            selectionRect.style.top = `${top}px`;
            selectionRect.style.width = `${width}px`;
            selectionRect.style.height = `${height}px`;

            highlightApples(left, top, width, height);
        }

        function handleEnd() {
            if (!isDragging || !gameActive) return;
            isDragging = false;
            
            const rect = selectionRect.getBoundingClientRect();
            const gridRect = gridElement.getBoundingClientRect();
            
            const selLeft = rect.left - gridRect.left;
            const selTop = rect.top - gridRect.top;
            
            checkSelection(selLeft, selTop, rect.width, rect.height);
            
            selectionRect.style.display = 'none';
            apples.forEach(a => a.element.classList.remove('highlight'));
        }

        function highlightApples(left, top, width, height) {
            apples.forEach(apple => {
                if (apple.removed) return;
                const el = apple.element;
                const isOverlap = !(el.offsetLeft > left + width || 
                                   el.offsetLeft + el.offsetWidth < left || 
                                   el.offsetTop > top + height || 
                                   el.offsetTop + el.offsetHeight < top);
                
                if (isOverlap) el.classList.add('highlight');
                else el.classList.remove('highlight');
            });
        }

        function checkSelection(left, top, width, height) {
            let sum = 0;
            const selectedApples = [];

            apples.forEach(apple => {
                if (apple.removed) return;
                const el = apple.element;
                const isOverlap = !(el.offsetLeft > left + width || 
                                   el.offsetLeft + el.offsetWidth < left || 
                                   el.offsetTop > top + height || 
                                   el.offsetTop + el.offsetHeight < top);
                
                if (isOverlap) {
                    sum += apple.value;
                    selectedApples.push(apple);
                }
            });

            if (sum === 10 && selectedApples.length > 0) {
                selectedApples.forEach(apple => {
                    apple.removed = true;
                    apple.element.classList.add('removed');
                });
                score += selectedApples.length;
                scoreElement.innerText = score;
            }
        }

        // 전체 컨테이너 및 윈도우에 이벤트 바인딩
        boardContainer.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        boardContainer.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        resetBtn.addEventListener('click', startGame);
        window.addEventListener('resize', () => { if (gameActive) initGrid(); });

        startGame();
    </script>
</body>
</html>
